# 在推送到默认分支后，用 git-cliff 根据提交历史重写根目录 CHANGELOG.md 并自动提交。
# 自动提交信息含 [skip ci]，避免与工作流形成循环触发。
name: Changelog

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  actions: write
  contents: write

concurrency:
  group: changelog-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' &&
       github.event.head_commit != null &&
       !contains(github.event.head_commit.message, '[skip ci]') &&
       !contains(github.event.head_commit.message, '[skip changelog]'))
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate CHANGELOG.md
        uses: orhun/git-cliff-action@v4
        id: git-cliff
        with:
          config: cliff.toml
          args: --current --tag ""
        env:
          OUTPUT: CHANGELOG.md
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit changelog
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          file_pattern: CHANGELOG.md
          commit_message: "chore(changelog): 同步 CHANGELOG [skip ci]"
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com
          commit_options: '-f'  # 强制提交被 .gitignore 排除的文件
