# 在推送到默认分支后，用 git-cliff 根据提交历史重写根目录 CHANGELOG.md 并自动提交。
# 自动提交信息含 [skip ci]，避免与工作流形成循环触发。
name: Changelog

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  actions: write
  contents: write

concurrency:
  group: changelog-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' &&
       github.event.head_commit != null &&
       !contains(github.event.head_commit.message, '[skip ci]') &&
       !contains(github.event.head_commit.message, '[skip changelog]'))
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate CHANGELOG.md
        uses: orhun/git-cliff-action@v4
        id: git-cliff
        with:
          config: cliff.toml
          args: --current --tag ""
        env:
          OUTPUT: CHANGELOG.md
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Remove any CHANGELOG.md in subdirectories
        run: |
          find . -name "CHANGELOG.md" -not -path "./CHANGELOG.md" -delete

      - name: Commit changelog to isolated branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # 备份 CHANGELOG.md
          cp CHANGELOG.md /tmp/CHANGELOG_BACKUP.md
          
          # 创建孤立分支（无历史）
          git checkout --orphan changelog
          
          # 清空所有文件
          git rm -rf . 2>/dev/null || true
          rm -rf *
          
          # 恢复 CHANGELOG.md
          mv /tmp/CHANGELOG_BACKUP.md CHANGELOG.md
          
          # 提交
          git add CHANGELOG.md
          git commit -m "chore(changelog): 同步 CHANGELOG [skip ci]"
          
          # 强制推送
          git push origin changelog --force
